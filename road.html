<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Road</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── LAYER 1: viewport root — pagebkg.png fills the bars/corners ── */
  body {
    background: #000 url('assets/pagebkg.png') center center / cover no-repeat;
    overflow: hidden;
    width: 100vw; height: 100vh;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── LAYER 2: 16:9 game container — canvases live here ── */
  #wrap {
    position: relative;
    width:  min(100vw, 177.78vh);
    height: min(100vh, 56.25vw);
    flex-shrink: 0;
    background: #000;
    overflow: hidden;
  }

  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #post {
    pointer-events: none;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #clicker { position: absolute; inset: 0; z-index: 5; }
  #fade {
    position: absolute; inset: 0; background: #000;
    pointer-events: none; opacity: 1;
    transition: opacity 1.4s ease; z-index: 10;
  }
  #fade.clear { opacity: 0; }
  #fade.out   { opacity: 1; pointer-events: all; transition: opacity 3s ease; }

  /* overlay.png is composited onto the scene canvas before post-processing
     so it gets dithered naturally — no separate DOM element needed */
</style>
</head>
<body>
<div id="wrap">
  <canvas id="scene"></canvas>
  <canvas id="post"></canvas>
  <div id="clicker"></div>
  <div id="fade"></div>
</div>

<script>
// ─── AUDIO ────────────────────────────────────────────────────────────────────
let AudioCtx = null;
let drivingNode = null;

async function startAudio() {
  try {
    if (!AudioCtx) AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const res = await fetch('assets/driving.mp3');
    const buf = await AudioCtx.decodeAudioData(await res.arrayBuffer());
    const src  = AudioCtx.createBufferSource();
    const gain = AudioCtx.createGain();
    src.buffer = buf; src.loop = true;
    src.connect(gain); gain.connect(AudioCtx.destination);
    gain.gain.setValueAtTime(0, AudioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.6, AudioCtx.currentTime + 2.5);
    src.start();
    drivingNode = gain;
  } catch(e) { /* asset missing — silent */ }
}

// ─── SETUP ────────────────────────────────────────────────────────────────────
const scene = document.getElementById('scene');
const ctx   = scene.getContext('2d');
const post  = document.getElementById('post');
const pctx  = post.getContext('2d');

let W, H, VP_X, VP_Y;
let _stars = null;

function resize() {
  const wrap = document.getElementById('wrap');
  W = wrap.clientWidth; H = wrap.clientHeight;
  scene.width = post.width  = W;
  scene.height= post.height = H;
  VP_X = W * 0.5;
  VP_Y = H * 0.40;
  _stars = null;
}
window.addEventListener('resize', resize);
resize();

// ─── ASSETS ───────────────────────────────────────────────────────────────────
const carImg      = new Image(); carImg.src      = 'assets/car.png';
const airFreshImg = new Image(); airFreshImg.src = 'assets/airfreshener.png';
const bridgeImg   = new Image(); bridgeImg.src   = 'assets/bridgefog.png';
const overlayImg  = new Image(); overlayImg.src  = 'assets/overlay.png';

let freshAngle = 0;
let freshVel   = 0;
const FRESH_DAMP    = 0.97;
const FRESH_RESTORE = 0.018;

// ─── TYPING SOUND — synthesized click, no asset needed ────────────────────────
function playTypingClick() {
  if (!AudioCtx) return;
  try {
    const t    = AudioCtx.currentTime;
    const buf  = AudioCtx.createBuffer(1, Math.floor(AudioCtx.sampleRate * 0.012), AudioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.18));
    }
    const src  = AudioCtx.createBufferSource();
    const gain = AudioCtx.createGain();
    const filt = AudioCtx.createBiquadFilter();
    filt.type            = 'bandpass';
    filt.frequency.value = 1800;
    filt.Q.value         = 0.8;
    src.buffer = buf;
    src.connect(filt); filt.connect(gain); gain.connect(AudioCtx.destination);
    gain.gain.setValueAtTime(0.09, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.012);
    src.start(t);
  } catch(e) { /* silent */ }
}

// ─── REARVIEW MIRROR — offscreen canvases ────────────────────────────────────
// mirrorSceneCanvas: snapshot taken BEFORE car/moon are drawn
const mirrorSceneCanvas = document.createElement('canvas');
const msctx             = mirrorSceneCanvas.getContext('2d');
// mirrorCanvas: the scaled, flipped, taillights-composited output
const mirrorCanvas = document.createElement('canvas');
const mctx         = mirrorCanvas.getContext('2d');

// ─── GEOMETRY ─────────────────────────────────────────────────────────────────
function depthToY(d)     { return VP_Y + (H - VP_Y) * d; }
function depthToScale(d) { return 0.04 + d * 0.96; }

// Single consistent gentle curve — Night Driver style
const CURVE_DIR = 0.055;
function roadCurveOffset(d) {
  return CURVE_DIR * W * d * (1 - d) * 3.2;
}

function roadEdgeX(d, side) {
  const hw = (W * 0.030) + (W * 0.42 - W * 0.030) * d;
  return VP_X + side * hw + roadCurveOffset(d);
}

// ─── ROAD UPDATE ──────────────────────────────────────────────────────────────
const SPEED = 1.6;
let dashOffset = 0;

function updateRoad(dt) {
  dashOffset = (dashOffset + dt * SPEED) % 1.0;
}

// ─── REFLECTORS — bigger, fewer, more spaced ──────────────────────────────────
const REF_COUNT = 6;

function drawReflectors() {
  for (let i = 0; i < REF_COUNT; i++) {
    const d = ((i / REF_COUNT) + dashOffset) % 1.0;
    if (d < 0.06 || d > 0.97) continue;
    const scale = depthToScale(d);
    const y     = depthToY(d);
    for (const side of [-1, 1]) {
      const x     = roadEdgeX(d, side) + side * W * 0.005;
      const rw    = Math.max(4, 18 * scale);
      const rh    = Math.max(2, 10 * scale);
      const alpha = Math.pow(d, 0.4) * 0.95;
      ctx.save();
      ctx.globalAlpha  = alpha;
      ctx.shadowColor  = 'rgba(255, 240, 160, 0.9)';
      ctx.shadowBlur   = 8 * scale;
      ctx.fillStyle    = '#ffe890';
      ctx.fillRect(x - rw * 0.5, y - rh * 0.5, rw, rh);
      ctx.restore();
    }
  }
}

// ─── ROAD ─────────────────────────────────────────────────────────────────────
function drawRoad() {
  const STEPS    = 40;
  const leftPts  = [];
  const rightPts = [];
  for (let i = 0; i <= STEPS; i++) {
    const d = i / STEPS;
    leftPts.push( { x: roadEdgeX(d, -1), y: depthToY(d) });
    rightPts.push({ x: roadEdgeX(d,  1), y: depthToY(d) });
  }

  // Asphalt
  const roadGrad = ctx.createLinearGradient(0, VP_Y, 0, H);
  roadGrad.addColorStop(0,   '#0b0918');
  roadGrad.addColorStop(0.5, '#111020');
  roadGrad.addColorStop(1,   '#171530');
  ctx.fillStyle = roadGrad;
  ctx.beginPath();
  ctx.moveTo(leftPts[0].x, leftPts[0].y);
  for (const p of leftPts) ctx.lineTo(p.x, p.y);
  for (const p of [...rightPts].reverse()) ctx.lineTo(p.x, p.y);
  ctx.closePath(); ctx.fill();

  // Edge lines
  ctx.save();
  ctx.strokeStyle = 'rgba(150,145,170,0.16)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  leftPts.forEach((p, i)  => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();
  ctx.beginPath();
  rightPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();
  ctx.restore();

  // Center dashes — longer dashes, wider gaps, chunkier
  const DASH_LEN = 0.075;
  const GAP_LEN  = 0.085;
  const PERIOD   = DASH_LEN + GAP_LEN;
  const NUM_DASH = Math.ceil(1.0 / PERIOD) + 2;

  for (let i = 0; i < NUM_DASH; i++) {
    const d0 = ((i * PERIOD) + (dashOffset % PERIOD)) % 1.0;
    const d1 = Math.min(d0 + DASH_LEN, 0.97);
    if (d0 < 0.025 || d0 > 0.96) continue;

    const SUB = 8;
    const pts = [];
    for (let s = 0; s <= SUB; s++) {
      const dd = d0 + (d1 - d0) * (s / SUB);
      const cx = (roadEdgeX(dd, -1) + roadEdgeX(dd, 1)) * 0.5;
      pts.push({ x: cx, y: depthToY(dd) });
    }

    const alpha = Math.pow(d0, 0.5) * 0.88;
    const lw    = Math.max(4, depthToScale(d0) * 16);

    ctx.save();
    ctx.strokeStyle = `rgba(210,205,175,${alpha})`;
    ctx.lineWidth   = lw;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.restore();
  }
}

// ─── HEADLIGHT GLOW — single centered ambient beam ────────────────────────────
function drawHeadlightCones() {
  const baseY = H * 0.88;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // Wide outer cone — tall ellipse stretching up the road toward horizon
  ctx.save();
  ctx.translate(VP_X, baseY);
  ctx.scale(1, 0.55);
  const gOuter = ctx.createRadialGradient(0, 0, 0, 0, 0, W * 0.70);
  gOuter.addColorStop(0,    'rgba(255, 252, 195, 0.18)');
  gOuter.addColorStop(0.22, 'rgba(245, 248, 170, 0.09)');
  gOuter.addColorStop(0.55, 'rgba(210, 228, 140, 0.03)');
  gOuter.addColorStop(1,    'rgba(0, 0, 0, 0)');
  ctx.beginPath();
  ctx.arc(0, 0, W * 0.52, 0, Math.PI * 2);
  ctx.fillStyle = gOuter;
  ctx.fill();
  ctx.restore();

  // Tight bright center hotspot — the hood reflection
  const gHot = ctx.createRadialGradient(VP_X, baseY, 0, VP_X, baseY, W * 0.24);
  gHot.addColorStop(0,    'rgba(255, 255, 210, 0.28)');
  gHot.addColorStop(0.30, 'rgba(255, 252, 185, 0.11)');
  gHot.addColorStop(1,    'rgba(0, 0, 0, 0)');
  ctx.beginPath();
  ctx.arc(VP_X, baseY, W * 0.24, 0, Math.PI * 2);
  ctx.fillStyle = gHot;
  ctx.fill();

  // Road surface wash — long gentle streak down the center lane
  const roadGlow = ctx.createRadialGradient(VP_X, H * 0.88, 0, VP_X, H * 0.88, W * 0.62);
  roadGlow.addColorStop(0,   'rgba(215, 218, 155, 0.09)');
  roadGlow.addColorStop(0.5, 'rgba(185, 198, 125, 0.03)');
  roadGlow.addColorStop(1,   'rgba(0, 0, 0, 0)');
  ctx.beginPath();
  ctx.rect(0, VP_Y, W, H - VP_Y);
  ctx.fillStyle = roadGlow;
  ctx.fill();

  ctx.restore();
}

// ─── CAR PNG — full width, bottom-aligned ─────────────────────────────────────
function drawCar() {
  if (carImg.naturalWidth <= 0) return;
  const cw = W;
  const ch = cw * (carImg.naturalHeight / carImg.naturalWidth);
  ctx.drawImage(carImg, VP_X - cw * 0.5, H - ch, cw, ch);
}

// ─── AIR FRESHENER — lower + bigger ──────────────────────────────────────────
function drawAirFreshener() {
  if (airFreshImg.naturalWidth <= 0 || carImg.naturalWidth <= 0) return;

  const cw    = W;
  const ch    = cw * (carImg.naturalHeight / carImg.naturalWidth);
  const carY  = H - ch;
  const scale = cw / carImg.naturalWidth;

  // Pivot lower — 340px down in image space
  const pivotX = VP_X;
  const pivotY = carY + 460 * scale;

  // Slightly bigger — 8.2% of car width
  const fw = cw * 0.086;
  const fh = fw * (airFreshImg.naturalHeight / airFreshImg.naturalWidth);

  // Lower baseline — 575px from car bottom in image space
  const baselineCanvasY = carY + (carImg.naturalHeight - 575) * scale;
  const stringLen = baselineCanvasY - pivotY - fh;

  // Pendulum
  const nudge = Math.sin(performance.now() * 0.00073) * 0.00055
              + Math.sin(performance.now() * 0.00131) * 0.00028;
  freshVel += (-FRESH_RESTORE * freshAngle) + nudge;
  freshVel *= FRESH_DAMP;
  freshAngle += freshVel;

  ctx.save();
  ctx.translate(pivotX, pivotY);
  ctx.rotate(freshAngle);

  if (stringLen > 0) {
    ctx.strokeStyle = 'rgba(200,185,160,0.55)';
    ctx.lineWidth   = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, stringLen);
    ctx.stroke();
  }

  ctx.drawImage(airFreshImg, -fw * 0.5, Math.max(0, stringLen), fw, fh);
  ctx.restore();
}

// ─── REARVIEW MIRROR ─────────────────────────────────────────────────────────
// Renders the road scene flipped horizontally into a rounded-rect mirror
// positioned just above the air freshener pivot point.
function drawRearviewMirror() {
  if (carImg.naturalWidth <= 0) return;

  const cw    = W;
  const ch    = cw * (carImg.naturalHeight / carImg.naturalWidth);
  const carY  = H - ch;
  const scale = cw / carImg.naturalWidth;

  // Mirror dimensions — adjusted per measurements (1920px reference)
  // ~100px wider total (60px left, 40px right), shifted left, dropped ~115px
  const baseW  = W * 0.16;
  const mw     = baseW + W * 0.052;            // +100px at 1920
  const mh     = mw * 0.38;
  // Center shifts left by (60-40)/2 * (W/1920) = 10px at 1920 → W*0.0052
  const mx = VP_X - mw * 0.5 - W * 0.0052;
  // Drop ~115px at 1080p → H*0.106
  const my = carY + 310 * scale - mh + H * 0.106;

  // Size the offscreen canvas to the mirror footprint (render at half-res for perf)
  const rw = Math.ceil(mw * 0.6);
  const rh = Math.ceil(mh * 0.6);
  if (mirrorCanvas.width !== rw || mirrorCanvas.height !== rh) {
    mirrorCanvas.width = rw; mirrorCanvas.height = rh;
  }

  // Sample from the clean road-only snapshot (no car, no moon)
  mctx.save();
  mctx.clearRect(0, 0, rw, rh);
  mctx.translate(rw, 0);
  mctx.scale(-1, 1);
  mctx.drawImage(mirrorSceneCanvas, 0, 0, W, H * 0.55, 0, 0, rw, rh);
  mctx.restore();

  // Taillights gradient — red glow pooling at the bottom of the mirror
  const tails = mctx.createLinearGradient(0, rh * 0.55, 0, rh);
  tails.addColorStop(0,   'rgba(180, 15, 8, 0)');
  tails.addColorStop(0.5, 'rgba(200, 20, 8, 0.18)');
  tails.addColorStop(1,   'rgba(220, 30, 10, 0.52)');
  mctx.fillStyle = tails;
  mctx.fillRect(0, 0, rw, rh);

  // Draw mirror contents clipped to rounded rect
  ctx.save();
  const r = mh * 0.28; // corner radius
  ctx.beginPath();
  ctx.moveTo(mx + r, my);
  ctx.lineTo(mx + mw - r, my);
  ctx.quadraticCurveTo(mx + mw, my,     mx + mw, my + r);
  ctx.lineTo(mx + mw, my + mh - r);
  ctx.quadraticCurveTo(mx + mw, my + mh, mx + mw - r, my + mh);
  ctx.lineTo(mx + r, my + mh);
  ctx.quadraticCurveTo(mx, my + mh, mx, my + mh - r);
  ctx.lineTo(mx, my + r);
  ctx.quadraticCurveTo(mx, my, mx + r, my);
  ctx.closePath();
  ctx.clip();

  ctx.drawImage(mirrorCanvas, mx, my, mw, mh);

  // Slight convex darkening vignette at edges (mirror curvature feel)
  const vig = ctx.createRadialGradient(mx + mw*0.5, my + mh*0.5, mh*0.1, mx + mw*0.5, my + mh*0.5, mw*0.62);
  vig.addColorStop(0,   'rgba(0,0,0,0)');
  vig.addColorStop(0.7, 'rgba(0,0,0,0.08)');
  vig.addColorStop(1,   'rgba(0,0,0,0.42)');
  ctx.fillStyle = vig; ctx.fillRect(mx, my, mw, mh);

  ctx.restore();

}


// ─── BRIDGE — right side fades to transparent ─────────────────────────────────
function drawBridge() {
  const bw = W * 0.28;
  const bh = VP_Y * 0.82;
  const bx = -W * 0.01;
  const by = VP_Y - bh * 0.90 + VP_Y * 0.05;

  ctx.save();

  // Draw bridge image at full opacity into a clipping region
  ctx.globalAlpha = 0.80;
  if (bridgeImg.naturalWidth > 0) {
    ctx.drawImage(bridgeImg, bx, by, bw, bh);
  } else {
    ctx.fillStyle = '#06040e';
    ctx.fillRect(bx, by + bh * 0.65, bw, bh * 0.06);
  }

  ctx.restore();
}

// ─── SKY + BRIDGE FOG — slow drifting cloud wisps ────────────────────────────
// Three layers of elliptical mist at different speeds and depths,
// pooling near the horizon and washing over the bridge silhouette.
function drawFog(now) {
  const t = now * 0.001;

  // Each cloud puff: { ox, oy, rx, ry, speed, phase, alpha }
  // ox/oy are normalized 0–1 relative to W and VP_Y
  // Pale moonlit wisps — must be LIGHTER than sky, not darker
  const PUFFS = [
    { ox: 0.08, oy: 0.88, rx: 0.32, ry: 0.06, spd: 0.018, ph: 0.00, a: 0.055 },
    { ox: 0.22, oy: 0.76, rx: 0.26, ry: 0.05, spd: 0.011, ph: 1.80, a: 0.040 },
    { ox: 0.48, oy: 0.92, rx: 0.38, ry: 0.07, spd: 0.024, ph: 0.90, a: 0.050 },
    { ox: 0.65, oy: 0.82, rx: 0.22, ry: 0.04, spd: 0.015, ph: 2.60, a: 0.035 },
    { ox: 0.78, oy: 0.95, rx: 0.30, ry: 0.06, spd: 0.009, ph: 0.40, a: 0.045 },
    { ox: -0.10,oy: 0.85, rx: 0.28, ry: 0.05, spd: 0.020, ph: 3.20, a: 0.040 },
    { ox: 0.50, oy: 0.98, rx: 0.85, ry: 0.04, spd: 0.006, ph: 1.10, a: 0.065 },
    { ox: 0.50, oy: 1.02, rx: 0.90, ry: 0.05, spd: 0.004, ph: 4.00, a: 0.050 },
  ];

  ctx.save();
  ctx.globalCompositeOperation = 'source-over';

  for (const p of PUFFS) {
    // Gentle horizontal drift — oscillates back and forth
    const drift = Math.sin(t * p.spd * Math.PI * 2 + p.ph) * W * 0.04;
    const cx    = p.ox * W + drift;
    const cy    = p.oy * VP_Y;
    const rx    = p.rx * W;
    const ry    = p.ry * VP_Y;

    // Clip to sky region — fog shouldn't bleed onto road
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W, VP_Y + 12);
    ctx.clip();

    // Pale cool mist — lavender-white, just brighter than the sky
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rx);
    g.addColorStop(0,    `rgba(195, 185, 220, ${p.a})`);
    g.addColorStop(0.45, `rgba(170, 160, 205, ${p.a * 0.55})`);
    g.addColorStop(1,    'rgba(140, 130, 180, 0)');

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, ry / rx);
    ctx.beginPath();
    ctx.arc(0, 0, rx, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();

    ctx.restore();
  }

  // A single soft brightness suppression layer over the bridge area —
  // makes it read as haze rather than just darkness
  // Pale mist pooling around the bridge base
  const bridgeMist = ctx.createLinearGradient(-W * 0.01, VP_Y * 0.62, W * 0.32, VP_Y);
  bridgeMist.addColorStop(0,   'rgba(190, 180, 215, 0.10)');
  bridgeMist.addColorStop(0.5, 'rgba(170, 160, 200, 0.05)');
  bridgeMist.addColorStop(1,   'rgba(140, 130, 175, 0)');
  ctx.fillStyle = bridgeMist;
  ctx.beginPath();
  ctx.rect(0, 0, W * 0.32, VP_Y + 8);
  ctx.fill();

  ctx.restore();
}

// ─── SKY ──────────────────────────────────────────────────────────────────────
function drawSky(now) {
  const grad = ctx.createLinearGradient(0, 0, 0, VP_Y);
  grad.addColorStop(0.00, '#010109');
  grad.addColorStop(0.35, '#08051a');
  grad.addColorStop(0.72, '#120828');
  grad.addColorStop(0.90, '#1c0c1e');
  grad.addColorStop(1.00, '#2a1014');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, VP_Y + 4);

  if (!_stars) {
    _stars = Array.from({length: 80}, () => ({
      x: Math.random(), y: Math.random() * 0.92,
      s: 0.3 + Math.random() * 1.1,
      ph: Math.random() * Math.PI * 2,
      sp: 0.3 + Math.random() * 1.6,
    }));
  }
  const t = now * 0.001;
  for (const st of _stars) {
    const tw = 0.3 + 0.7 * Math.abs(Math.sin(t * st.sp + st.ph));
    ctx.save();
    ctx.globalAlpha = tw * 0.72;
    ctx.fillStyle   = '#cce0ff';
    ctx.shadowColor = '#8abaff'; ctx.shadowBlur = 3;
    ctx.beginPath(); ctx.arc(st.x * W, st.y * VP_Y, st.s, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  const hg = ctx.createLinearGradient(0, VP_Y - 10, 0, VP_Y + 16);
  hg.addColorStop(0,   'rgba(80,35,12,0)');
  hg.addColorStop(0.4, 'rgba(110,48,12,0.12)');
  hg.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = hg; ctx.fillRect(0, VP_Y - 10, W, 26);
}

// ─── MOON — low and fat, rising behind the bridge ─────────────────────────────
function drawMoon() {
  // Low in sky, near the bridge on the left — just risen over it
  const mx = W * 0.18;
  const my = VP_Y * 0.72;
  const mr = W * 0.019; // smaller — matches scale of other scenes

  ctx.save();

  // Outer atmospheric halo — warm amber glow of a horizon moon
  const halo = ctx.createRadialGradient(mx, my, mr * 0.6, mx, my, mr * 4.5);
  halo.addColorStop(0,   'rgba(255, 210, 100, 0.13)');
  halo.addColorStop(0.3, 'rgba(230, 175,  70, 0.07)');
  halo.addColorStop(0.7, 'rgba(200, 140,  50, 0.03)');
  halo.addColorStop(1,   'rgba(0, 0, 0, 0)');
  ctx.beginPath();
  ctx.arc(mx, my, mr * 4.5, 0, Math.PI * 2);
  ctx.fillStyle = halo;
  ctx.fill();

  // Inner soft glow ring
  const glow = ctx.createRadialGradient(mx, my, mr * 0.8, mx, my, mr * 2.2);
  glow.addColorStop(0,   'rgba(255, 225, 140, 0.22)');
  glow.addColorStop(0.5, 'rgba(240, 195,  90, 0.09)');
  glow.addColorStop(1,   'rgba(0, 0, 0, 0)');
  ctx.beginPath();
  ctx.arc(mx, my, mr * 2.2, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Moon disc — warm ivory/amber-tinted from horizon atmosphere
  const disc = ctx.createRadialGradient(mx - mr * 0.22, my - mr * 0.18, 0, mx, my, mr);
  disc.addColorStop(0,    'rgba(255, 248, 215, 0.96)');
  disc.addColorStop(0.55, 'rgba(250, 230, 175, 0.93)');
  disc.addColorStop(0.85, 'rgba(235, 200, 130, 0.88)');
  disc.addColorStop(1,    'rgba(210, 170,  90, 0.70)');
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fillStyle = disc;
  ctx.fill();

  // Subtle maria — faint darker patches
  ctx.globalAlpha = 0.12;
  ctx.fillStyle   = 'rgba(140, 110, 60, 1)';
  ctx.beginPath(); ctx.ellipse(mx - mr*0.18, my - mr*0.08, mr*0.28, mr*0.18, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mx + mr*0.22, my + mr*0.15, mr*0.20, mr*0.13,  0.6, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ─── TREELINE ─────────────────────────────────────────────────────────────────
function drawTrees() {
  ctx.save();
  ctx.fillStyle = '#060410';
  ctx.beginPath();
  ctx.moveTo(W * 0.46, VP_Y);
  ctx.bezierCurveTo(W*0.52, VP_Y*0.87, W*0.60, VP_Y*0.91, W*0.68, VP_Y*0.86);
  ctx.bezierCurveTo(W*0.76, VP_Y*0.81, W*0.82, VP_Y*0.88, W*0.90, VP_Y*0.84);
  ctx.bezierCurveTo(W*0.95, VP_Y*0.88, W, VP_Y*0.90, W, VP_Y);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, VP_Y); ctx.lineTo(0, VP_Y * 0.94);
  ctx.bezierCurveTo(W*0.08, VP_Y*0.90, W*0.16, VP_Y*0.94, W*0.26, VP_Y*0.97);
  ctx.lineTo(W * 0.46, VP_Y); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── DIALOGUE ─────────────────────────────────────────────────────────────────
const ROAD_LINES = [
  { text: "I didn't plan on coming out this late.", italic: false },
  { text: "But the road was empty.", italic: false },
  { text: "And I kept thinking\u2026", italic: false },
  { text: "if you were here,", italic: true },
  { text: "you'd say this is your favorite time to go for a drive.", italic: false },
  { text: "You'd call it prime time for making core memories.", italic: false },
];
let dlgLines = [];

let dlgIndex    = 0;
let dlgChar     = 0;
let dlgTyping   = false;
let dlgReady    = false;
let dlgTimer    = null;
let sceneEnding = false;
let dlgVisible  = false;
let dlgAlpha    = 0;
let cursorOn    = true;
let cursorMs    = 0;
let lastFrameMs = 0;

const DLG_SIZE = 28;
const DLG_FONT = `'Silkscreen', monospace`;

// Dialogue Y: lower quarter of screen, anchored so it never drifts into the road
function dlgY() { return Math.max(H * 0.78, H - 165); }

// Text drawn on ctx (scene canvas) so it lives UNDER post-processing dither
function drawDialogue(now) {
  const dt = now - lastFrameMs;
  lastFrameMs = now;
  cursorMs = (cursorMs + dt) % 1000;
  cursorOn  = cursorMs < 520;

  const target = dlgVisible ? 1 : 0;
  dlgAlpha += (target - dlgAlpha) * 0.07;
  if (!dlgVisible && dlgAlpha <= 0.01) return;

  const line = dlgLines[dlgIndex];
  if (!line) return;

  ctx.save();
  ctx.globalAlpha = dlgAlpha;

  const displayed = line.text.slice(0, dlgChar);
  const tx = W * 0.09;
  const ty = dlgY();

  ctx.font         = `${line.italic ? 'italic ' : ''}${DLG_SIZE}px ${DLG_FONT}`;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';

  if (line.italic) {
    ctx.shadowColor = 'rgba(140, 200, 255, 0.95)';
    ctx.shadowBlur  = 22;
    ctx.fillStyle   = 'rgba(155, 205, 245, 0.45)';
    ctx.fillText(displayed, tx, ty);
    ctx.shadowBlur  = 9;
    ctx.fillStyle   = 'rgba(195, 225, 255, 0.92)';
    ctx.fillText(displayed, tx, ty);
  } else {
    ctx.shadowColor = 'rgba(150, 215, 255, 0.70)';
    ctx.shadowBlur  = 16;
    ctx.fillStyle   = 'rgba(175, 215, 240, 0.42)';
    ctx.fillText(displayed, tx, ty);
    ctx.shadowBlur  = 5;
    ctx.fillStyle   = '#bcdcf0';
    ctx.fillText(displayed, tx, ty);
  }

  // Blinking cursor
  if (dlgReady && cursorOn) {
    const tw = ctx.measureText(displayed).width;
    ctx.shadowColor = 'rgba(130, 190, 240, 0.8)';
    ctx.shadowBlur  = 6;
    ctx.fillStyle   = '#88b8d8';
    ctx.fillRect(tx + tw + 3, ty + 3, 4, DLG_SIZE - 4);
  }

  // "click to continue" — arrow tethered just below the blinking cursor
  if (dlgReady) {
    const pulse  = 0.30 + 0.28 * Math.abs(Math.sin(now * 0.0016));
    const bob    = Math.sin(now * 0.0022) * 3.5;
    // X tracks the cursor: end of displayed text + same offset as the cursor rect
    const tw     = ctx.measureText(displayed).width;
    const arrowX = tx + tw + 3 + 2;              // center on the 4px cursor rect
    const arrowY = ty + DLG_SIZE + 14 + bob;
    const aw = 9, ah = 6;
    ctx.save();
    ctx.globalAlpha  = dlgAlpha * pulse;
    ctx.shadowColor  = 'rgba(130,190,240,0.85)'; ctx.shadowBlur = 10;
    ctx.fillStyle    = 'rgba(160,210,245,0.90)';
    ctx.beginPath();
    ctx.moveTo(arrowX - aw, arrowY - ah);
    ctx.lineTo(arrowX + aw, arrowY - ah);
    ctx.lineTo(arrowX,      arrowY + ah * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

// dlgFading: true while old line is fading out before next line begins
let dlgFading = false;

function typeNextLine() {
  const line = dlgLines[dlgIndex];
  if (!line) { endScene(); return; }
  dlgVisible = true;
  dlgFading  = false;
  dlgChar    = 0;
  dlgTyping  = true;
  dlgReady   = false;

  function tick() {
    if (dlgChar >= line.text.length) {
      dlgTyping = false; dlgReady = true; return;
    }
    const ch = line.text[dlgChar++];
    if (ch !== ' ') playTypingClick();
    const delay = 54
      + (ch === ',' ? 190 : 0)
      + (ch === '.' ? 280 : 0)
      + (ch === '\u2026' ? 420 : 0);
    dlgTimer = setTimeout(tick, delay);
  }
  tick();
}

function startDialogue(lines, callback) {
  dlgLines   = lines;
  dlgIndex   = 0;
  dlgVisible = true;
  dlgAlpha   = 0;
  dlgFading  = false;
  typeNextLine();
}

function advanceDlg() {
  if (sceneEnding || dlgFading) return;
  if (dlgTyping) {
    clearTimeout(dlgTimer);
    dlgChar   = dlgLines[dlgIndex].text.length;
    dlgTyping = false; dlgReady = true;
    return;
  }
  if (dlgReady) {
    dlgFading  = true;
    dlgReady   = false;
    dlgVisible = false;
    setTimeout(() => {
      dlgIndex++;
      dlgAlpha  = 0;
      dlgFading = false;
      typeNextLine();
    }, 160);
  }
}

function endScene() {
  sceneEnding = true; dlgVisible = false;
  // Fade out driving audio
  if (drivingNode && AudioCtx) {
    drivingNode.gain.linearRampToValueAtTime(0, AudioCtx.currentTime + 2.5);
  }
  setTimeout(() => {
    document.getElementById('fade').classList.add('out');
    setTimeout(() => { window.location.href = 'fence.html'; }, 3000);
  }, 800);
}

// ─── POST PROCESSING ──────────────────────────────────────────────────────────
const offscreen = document.createElement('canvas');
const octx      = offscreen.getContext('2d', { willReadFrequently: true });

const BAYER8 = [
   0,32, 8,40, 2,34,10,42,
  48,16,56,24,50,18,58,26,
  12,44, 4,36,14,46, 6,38,
  60,28,52,20,62,30,54,22,
   3,35,11,43, 1,33, 9,41,
  51,19,59,27,49,17,57,25,
  15,47, 7,39,13,45, 5,37,
  63,31,55,23,61,29,53,21,
].map(v => v / 64);

const PIX    = 3;
const CSTEPS = 24;
const DSTR   = 0.018;
const ABER   = 0.006;

let postImageData = null;

function applyPost() {
  const pw = Math.ceil(W / PIX);
  const ph = Math.ceil(H / PIX);
  if (offscreen.width !== pw || offscreen.height !== ph) {
    offscreen.width = pw; offscreen.height = ph; postImageData = null;
  }

  // Stamp overlay.png onto the scene canvas so it gets dithered with everything else
  if (overlayImg.naturalWidth > 0) {
    ctx.save();
    ctx.globalAlpha = 1;
    ctx.drawImage(overlayImg, 0, 0, W, H);
    ctx.restore();
  }

  octx.clearRect(0, 0, pw, ph);
  octx.drawImage(scene, 0, 0, pw, ph);

  const src = octx.getImageData(0, 0, pw, ph);
  const sd  = src.data;

  if (!postImageData || postImageData.width !== pw || postImageData.height !== ph)
    postImageData = octx.createImageData(pw, ph);
  const dd = postImageData.data;
  const cx = pw / 2, cy = ph / 2;

  for (let y = 0; y < ph; y++) {
    for (let x = 0; x < pw; x++) {
      const i = (y * pw + x) * 4;
      // CRT barrel distortion (subtle — divisor 14)
      const nx = (x / pw) * 2 - 1, ny = (y / ph) * 2 - 1;
      const sxf = (nx + nx * (ny * ny) / 14) * 0.5 + 0.5;
      const syf = (ny + ny * (nx * nx) / 14) * 0.5 + 0.5;
      if (sxf < 0 || sxf > 1 || syf < 0 || syf > 1) { dd[i] = 0; dd[i+1] = 0; dd[i+2] = 0; dd[i+3] = 255; continue; }
      const sx = Math.round(sxf * pw), sy = Math.round(syf * ph);
      const si = (sy * pw + sx) * 4;
      const dx = (sx - cx) / pw, dy = (sy - cy) / ph;
      const dist  = Math.sqrt(dx*dx + dy*dy) * 1.42;
      const offPx = Math.round(dist * ABER * pw);
      const ir = (sy * pw + Math.min(pw - 1, sx + offPx)) * 4;
      const ib = (sy * pw + Math.max(0,       sx - offPx)) * 4;
      let r = sd[ir], g = sd[si + 1], b = sd[ib + 2];
      const bv   = BAYER8[(y % 8) * 8 + (x % 8)];
      const doff = (bv - 0.5) * DSTR * 255;
      r = Math.min(255, Math.max(0, Math.round((r + doff) / (255 / CSTEPS)) * (255 / CSTEPS)));
      g = Math.min(255, Math.max(0, Math.round((g + doff) / (255 / CSTEPS)) * (255 / CSTEPS)));
      b = Math.min(255, Math.max(0, Math.round((b + doff) / (255 / CSTEPS)) * (255 / CSTEPS)));
      dd[i] = r; dd[i+1] = g; dd[i+2] = b; dd[i+3] = sd[si+3];
    }
  }

  octx.putImageData(postImageData, 0, 0);

  pctx.clearRect(0, 0, W, H);
  pctx.save();
  pctx.imageSmoothingEnabled = false;
  pctx.drawImage(offscreen, 0, 0, W, H);
  pctx.restore();

  pctx.save();
  pctx.globalAlpha = 0.10;
  pctx.fillStyle   = '#000';
  for (let y = 0; y < H; y += PIX) pctx.fillRect(0, y + PIX - 1, W, 1);
  pctx.restore();

  const vig = pctx.createRadialGradient(W*0.5, H*0.65, H*0.05, W*0.5, H*0.65, H*0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.58)');
  pctx.fillStyle = vig;
  pctx.fillRect(0, 0, W, H);
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
let lastT = 0;
function frame(now) {
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  updateRoad(dt);

  ctx.clearRect(0, 0, W, H);
  drawSky(now);
  drawBridge();
  drawFog(now);
  drawTrees();
  drawRoad();
  drawReflectors();
  drawHeadlightCones();

  // Snapshot the scene here — road/sky/trees but NO car, NO moon
  if (mirrorSceneCanvas.width !== W || mirrorSceneCanvas.height !== H) {
    mirrorSceneCanvas.width = W; mirrorSceneCanvas.height = H;
  }
  msctx.clearRect(0, 0, W, H);
  msctx.drawImage(scene, 0, 0);

  drawMoon();
  drawAirFreshener();
  drawCar();
  drawRearviewMirror();
  drawDialogue(now);

  applyPost();

  requestAnimationFrame(frame);
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
let audioStarted = false;
document.getElementById('clicker').addEventListener('click', () => {
  if (!audioStarted) { audioStarted = true; startAudio(); }
  advanceDlg();
});
document.addEventListener('keydown', e => { if (e.key===' '||e.key==='Enter') advanceDlg(); });
document.addEventListener('touchend', e => { e.preventDefault(); advanceDlg(); }, {passive:false});

// ─── START ────────────────────────────────────────────────────────────────────
requestAnimationFrame(frame);
const fadeEl = document.getElementById('fade');
setTimeout(() => {
  fadeEl.classList.add('clear');
  setTimeout(() => startDialogue(ROAD_LINES), 1500);
}, 100);
</script>
</body>
