<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Weightless Stone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Gochi+Hand&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── LAYER 1: viewport root — pagebkg.png fills the bars/corners ── */
  body {
    background: #000 url('assets/pagebkg.png') center center / cover no-repeat;
    overflow: hidden;
    width: 100vw; height: 100vh;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── LAYER 2: 16:9 game container — canvases live here ── */
  #wrap {
    position: relative;
    width:  min(100vw, 177.78vh);
    height: min(100vh, 56.25vw);
    flex-shrink: 0;
    background: #000;
    overflow: hidden;
  }

  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #post {
    pointer-events: none;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #clicker { position: absolute; inset: 0; z-index: 5; cursor: default; }
  #fade {
    position: absolute; inset: 0; background: #000;
    pointer-events: none; opacity: 1; z-index: 10;
  }

  /* overlay.png is composited onto the scene canvas before post-processing
     so it gets dithered naturally — no separate DOM element needed */
</style>
</head>
<body>
<div id="wrap">
  <canvas id="scene"></canvas>
  <canvas id="post"></canvas>
  <div id="clicker"></div>
  <div id="fade"></div>
</div>
<script>
// ─── AUDIO ───────────────────────────────────────────────────────────────────
let titleAudio = null;
async function startTitleAudio() {
  try {
    titleAudio = new (window.AudioContext || window.webkitAudioContext)();
    // Ambient crickets/water
    const loadLoop = async (src, vol) => {
      const res = await fetch(src);
      const buf = await titleAudio.decodeAudioData(await res.arrayBuffer());
      const node = titleAudio.createBufferSource();
      const gain = titleAudio.createGain();
      node.buffer = buf; node.loop = true;
      node.connect(gain); gain.connect(titleAudio.destination);
      gain.gain.setValueAtTime(0, titleAudio.currentTime);
      gain.gain.linearRampToValueAtTime(vol, titleAudio.currentTime + 4);
      node.start();
      return gain;
    };
    loadLoop('assets/crickets_frogs.mp3', 0.4);
    // Optional: title music
    const res2 = await fetch('assets/title.mp3');
    const buf2 = await titleAudio.decodeAudioData(await res2.arrayBuffer());
    const mSrc = titleAudio.createBufferSource();
    const mGain = titleAudio.createGain();
    mSrc.buffer = buf2; mSrc.loop = true;
    mSrc.connect(mGain); mGain.connect(titleAudio.destination);
    mGain.gain.setValueAtTime(0, titleAudio.currentTime);
    mGain.gain.linearRampToValueAtTime(0.7, titleAudio.currentTime + 5);
    mSrc.start();
  } catch(e) {}
}

async function playTitleStoneSkip() {
  if (!titleAudio) return;
  try {
    const res = await fetch('assets/stone_skip.mp3');
    const buf = await titleAudio.decodeAudioData(await res.arrayBuffer());
    const src  = titleAudio.createBufferSource();
    const gain = titleAudio.createGain();
    src.buffer = buf;
    src.connect(gain); gain.connect(titleAudio.destination);
    gain.gain.setValueAtTime(0.4 + Math.random()*0.3, titleAudio.currentTime);
    src.start();
  } catch(e) {}
}

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const scene = document.getElementById('scene');
const ctx   = scene.getContext('2d');
const post  = document.getElementById('post');
const pctx  = post.getContext('2d');

let W, H, HORIZON_Y;
let _stars = null;
let letters = null;

function resize() {
  const wrap = document.getElementById('wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  scene.width = post.width  = W;
  scene.height= post.height = H;
  HORIZON_Y = Math.round(H * 0.48);
  _stars = null;
  letters = null; // rebuild letter positions on resize
  if (lilyPads.length)  initLilyPads();
  if (debris.length)    initDebris();
}
window.addEventListener('resize', resize);
resize();

// ─── ASSETS ───────────────────────────────────────────────────────────────────
const bridgeImg  = new Image();
bridgeImg.src   = 'assets/bridge.png';
const overlayImg = new Image();
overlayImg.src  = 'assets/overlay.png';
const cattailsImg = new Image();
cattailsImg.src = 'assets/cattails.png';
const rushesImg   = new Image();
rushesImg.src   = 'assets/rushes.png';

// ─── TIMING & PHASES ──────────────────────────────────────────────────────────
// All timed in ms from scene start
const T = {
  HORIZON_FADE_START : 800,
  HORIZON_FADE_DUR   : 2200,
  STARS_START        : 2000,
  STARS_DUR          : 4000,   // all stars finish blinking on by 6000
  WATER_START        : 3000,
  WATER_DUR          : 2500,
  LETTER_DROP_START  : 5500,   // letters start drifting down
  LETTER_SETTLE      : 8200,   // letters all settled on water
  RIPPLE_START       : 8200,   // ring ripples after each letter lands
  CLICK_PROMPT       : 9500,   // "click to continue" fades in
};

let sceneStart   = null;
let clickReady   = false;
let sceneEnded   = false;
let audioStarted = false;

// ─── PERLIN (water ripple) ─────────────────────────────────────────────────────
function fade(t)       { return t*t*t*(t*(t*6-15)+10); }
function lerp(a,b,t)   { return a+t*(b-a); }
const _perm = new Uint8Array(512);
(()=>{const p=Array.from({length:256},(_,i)=>i);for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}for(let i=0;i<512;i++)_perm[i]=p[i&255];})();
function grad2(h,x,y){const hh=h&3,u=hh<2?x:y,v=hh<2?y:x;return((hh&1)?-u:u)+((hh&2)?-v:v);}
function perlin2(x,y){const xi=Math.floor(x)&255,yi=Math.floor(y)&255,xf=x-Math.floor(x),yf=y-Math.floor(y),u=fade(xf),v=fade(yf),aa=_perm[_perm[xi]+yi],ab=_perm[_perm[xi]+yi+1],ba=_perm[_perm[xi+1]+yi],bb=_perm[_perm[xi+1]+yi+1];return lerp(lerp(grad2(aa,xf,yf),grad2(ba,xf-1,yf),u),lerp(grad2(ab,xf,yf-1),grad2(bb,xf-1,yf-1),u),v);}

// ─── STARS ────────────────────────────────────────────────────────────────────
function ensureStars() {
  if (_stars) return;
  _stars = Array.from({length:85}, () => ({
    x:   Math.random(),
    y:   Math.random() * 0.94,
    s:   0.4 + Math.random() * 1.2,
    ph:  Math.random() * Math.PI * 2,
    sp:  0.4 + Math.random() * 1.8,
    // staggered appearance time (0–1 within STARS_DUR)
    bornT: Math.random(),
  }));
}

// ─── TREELINE ─────────────────────────────────────────────────────────────────
function drawTrees(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#080514';
  ctx.beginPath();
  ctx.moveTo(0, HORIZON_Y);
  ctx.lineTo(0, HORIZON_Y*0.93);
  ctx.bezierCurveTo(W*0.08,HORIZON_Y*0.87, W*0.14,HORIZON_Y*0.91, W*0.22,HORIZON_Y*0.94);
  ctx.bezierCurveTo(W*0.30,HORIZON_Y*0.97, W*0.36,HORIZON_Y*0.93, W*0.44,HORIZON_Y*0.95);
  ctx.bezierCurveTo(W*0.50,HORIZON_Y*0.97, W*0.55,HORIZON_Y*0.93, W*0.60,HORIZON_Y*0.91);
  ctx.bezierCurveTo(W*0.65,HORIZON_Y*0.95, W*0.70,HORIZON_Y*0.97, W*0.76,HORIZON_Y*0.95);
  ctx.bezierCurveTo(W*0.82,HORIZON_Y*0.93, W*0.88,HORIZON_Y*0.88, W*0.94,HORIZON_Y*0.92);
  ctx.bezierCurveTo(W*0.97,HORIZON_Y*0.94, W,HORIZON_Y*0.93, W,HORIZON_Y);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── LETTER OBJECTS ───────────────────────────────────────────────────────────
// "A WEIGHTLESS STONE" — two lines centered on water
// Each letter drops from above horizon, then skips once on water with a ring
const LINE1 = 'A WEIGHTLESS STONE';
const FONT_SIZE_TITLE = Math.min(Math.max(W * 0.048, 32), 72);
const LETTER_SPACING  = 1.12;   // multiplier on measured char width

// Build letter positions lazily after canvas is sized
function buildLetters() {
  const fs  = Math.min(Math.max(W * 0.048, 32), 72);
  ctx.font  = `700 ${fs}px 'Silkscreen', monospace`;
  const text = LINE1;
  const totalW = ctx.measureText(text).width;
  const startX = (W - totalW) * 0.5;
  // textBaseline = 'alphabetic': the baseline (bottom of most letters) sits on HORIZON_Y
  // Adding a small offset so the letters appear to float ON the water, not cut into it
  const restY  = HORIZON_Y + Math.round(fs * 0.08);

  letters = [];
  let cx = startX;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const cw = ctx.measureText(ch).width;
    const stagger = i / (text.length - 1); // 0..1
    letters.push({
      ch,
      restX: cx + cw * 0.5,
      restY,
      cw,
      // Drop animation: each letter starts at staggered time
      dropStart: T.LETTER_DROP_START + stagger * 1600,  // ms from sceneStart
      dropDur:   600 + Math.random() * 200,
      // Quantized stutter-fall state
      progress: 0,
      settled:  false,
      ringBorn: null,   // when ring was spawned (performance.now)
      ringSounded: false,
      // Current draw position
      x: cx + cw * 0.5,
      y: -80,
      fs,
    });
    cx += cw;
  }
}

// ─── RIPPLE RINGS (for letter landings) ───────────────────────────────────────
class TitleRipple {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.born = performance.now();
    this.dur  = 1800;
    this.done = false;
    this.rings = [0, 220, 440].map(d => ({ delay: d }));
  }
  draw(now) {
    const elapsed = now - this.born;
    let allDone = true;
    for (const ring of this.rings) {
      const rt = elapsed - ring.delay;
      if (rt < 0) { allDone = false; continue; }
      const t = Math.min(rt / this.dur, 1);
      if (t >= 1) { ring.done = true; continue; }
      allDone = false;
      const r  = t * (55 + ring.delay * 0.12);
      const ry = r * 0.28;
      let alpha = t < 0.15 ? t / 0.15 : 1 - ((t - 0.15) / 0.85);
      alpha = Math.pow(alpha, 0.7) * 0.7;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = `rgba(120,200,255,${alpha})`;
      ctx.lineWidth   = (2 - t * 1.5) * alpha;
      ctx.shadowColor = `rgba(80,170,255,${alpha * 0.5})`;
      ctx.shadowBlur  = 8;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, r, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    this.done = allDone;
  }
}
let ripples = [];

const SHORE_H = 55; // matches the shore band drawn at bottom of index scene

// ─── CATTAILS + RUSHES ────────────────────────────────────────────────────────
function drawCattails(alpha) {
  if (cattailsImg.naturalWidth <= 0) return;
  const aspect = cattailsImg.naturalWidth / cattailsImg.naturalHeight;
  const ch = HORIZON_Y * 0.54;
  const cw = ch * aspect;
  ctx.save(); ctx.globalAlpha = alpha * 0.90;
  ctx.drawImage(cattailsImg, W * 0.18 - cw * 0.5, HORIZON_Y - ch + 8, cw, ch);
  ctx.restore();
}

function drawRushes(alpha) {
  if (rushesImg.naturalWidth <= 0) return;
  const aspect = rushesImg.naturalWidth / rushesImg.naturalHeight;
  const rh = HORIZON_Y * 0.68;
  const rw = rh * aspect;
  ctx.save(); ctx.globalAlpha = alpha * 0.88;
  ctx.drawImage(rushesImg, W * 0.80, HORIZON_Y - rh * 0.55, rw, rh);
  ctx.restore();
}

// ─── LILY PADS ────────────────────────────────────────────────────────────────
const MOON_SHIFT_X = -4;
const MOON_SHIFT_Y = -2;

class LilyPad {
  constructor(ax, ay, radius, gapAngle) {
    this.ax         = ax;
    this.ay         = ay;
    this.baseRadius = radius;
    this.gapAngle   = gapAngle;
    this.phase      = Math.random() * Math.PI * 2;
    this.bobSpeed   = 0.0004 + Math.random() * 0.0003;
    this.bobAmp     = 1.0 + Math.random() * 1.8;
    this.wobble     = 0;
  }
  update(dt) {
    if (this.wobble > 0) { this.wobble -= dt * 0.0012; if (this.wobble < 0) this.wobble = 0; }
  }
  _buildPath(ctx, r, scaleY, offX, offY) {
    const ws = Math.sin(this.wobble * Math.PI) * 0.18;
    const ori = this.gapAngle + ws;
    const gh = Math.PI * (40 / 360);
    const startA = ori + gh, endA = ori + Math.PI * 2 - gh;
    ctx.beginPath(); ctx.moveTo(offX, offY);
    for (let i = 0; i <= 60; i++) {
      const a = startA + (endA - startA) * (i / 60);
      ctx.lineTo(Math.cos(a) * r + offX, Math.sin(a) * r * scaleY + offY);
    }
    ctx.closePath();
  }
  draw(now, alpha) {
    const waterH = H - SHORE_H - HORIZON_Y;
    const x = this.ax * W;
    const y = HORIZON_Y + waterH * this.ay;
    const bob = Math.sin(now * this.bobSpeed + this.phase) * this.bobAmp;
    const r = this.baseRadius, scaleY = 0.40;
    ctx.save(); ctx.translate(x, y + bob);
    // Moonlight rim
    this._buildPath(ctx, r * 1.02, scaleY, MOON_SHIFT_X, MOON_SHIFT_Y);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = alpha * 0.28;
    ctx.fillStyle = 'rgba(70,180,140,1)';
    ctx.shadowColor = 'rgba(60,170,130,0.6)'; ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
    // Pad body
    this._buildPath(ctx, r, scaleY, 0, 0);
    const bodyGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
    bodyGrad.addColorStop(0,   'rgba(14,36,18,0.97)');
    bodyGrad.addColorStop(0.6, 'rgba(8,22,12,0.98)');
    bodyGrad.addColorStop(1,   'rgba(4,14,8,0.99)');
    ctx.globalAlpha = alpha;
    ctx.fillStyle = bodyGrad; ctx.fill();
    ctx.restore();
  }
}

let lilyPads  = [];
let lilyClump = [];

function initLilyPads() {
  const spread = [
    [0.42, 0.38, 24, Math.PI * 0.5],
    [0.62, 0.55, 28, Math.PI * 1.3],
    [0.28, 0.60, 20, Math.PI * 0.9],
  ];
  const clump = [
    [0.76, 0.82, 38, Math.PI * 0.6],
    [0.82, 0.88, 32, Math.PI * 1.2],
    [0.70, 0.90, 26, Math.PI * 0.3],
    [0.88, 0.78, 30, Math.PI * 1.8],
    [0.78, 0.94, 22, Math.PI * 1.0],
  ];
  lilyPads  = spread.map(([ax, ay, r, g]) => new LilyPad(ax, ay, r, g));
  lilyClump = clump.map(([ax, ay, r, g])  => new LilyPad(ax, ay, r, g));
}

// ─── DEBRIS (twigs + leaves drifting across water) ───────────────────────────
class Debris {
  constructor(offscreen = false) { this._init(offscreen); }
  _init(offscreen = false) {
    this.type  = Math.random() < 0.55 ? 'twig' : 'leaf';
    this.side  = Math.random() < 0.5 ? -1 : 1;
    this.speed = (0.006 + Math.random() * 0.01) * -this.side;
    this.depthT = 0.1 + Math.random() * 0.85;
    const waterH = H - SHORE_H - HORIZON_Y;
    this.y = HORIZON_Y + waterH * (0.05 + this.depthT * 0.88);
    this.x = offscreen ? (this.side < 0 ? W + 80 : -80) : Math.random() * W;
    this.angle = (Math.random() - 0.5) * Math.PI * 0.6;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.006 + Math.random() * 0.012;
    if (this.type === 'twig') {
      this.length   = 18 + Math.random() * 28;
      this.branches = Math.random() < 0.55;
    } else {
      this.rx = 7 + Math.random() * 9;
      this.ry = 4 + Math.random() * 5;
    }
  }
  reset() { this._init(true); }
  update() {
    this.wobble += this.wobbleSpeed;
    this.x += this.speed + Math.sin(this.wobble) * 0.04;
    this.angle += Math.sin(this.wobble * 0.7) * 0.002;
    if (this.x < -100 || this.x > W + 100) this.reset();
  }
  draw(alpha) {
    const leadAngle = this.speed < 0 ? 0 : Math.PI;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.globalAlpha = alpha;
    if (this.type === 'twig') {
      const len = this.length;
      ctx.save();
      ctx.strokeStyle = 'rgba(6,12,8,0.97)'; ctx.lineWidth = 1.5 + this.depthT * 1.2;
      ctx.lineCap = 'round'; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 3;
      ctx.beginPath(); ctx.moveTo(-len * 0.5, 0); ctx.lineTo(len * 0.5, 0); ctx.stroke();
      if (this.branches) {
        ctx.beginPath(); ctx.moveTo(-len * 0.1, 0); ctx.lineTo(-len * 0.1 - len * 0.25, -len * 0.18); ctx.stroke();
      }
      ctx.restore();
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = 'rgba(70,185,140,0.65)'; ctx.lineWidth = 1;
      ctx.shadowColor = 'rgba(50,160,120,1)'; ctx.shadowBlur = 6; ctx.lineCap = 'round';
      const hx = Math.cos(leadAngle) * len * 0.5;
      ctx.beginPath(); ctx.moveTo(hx - 4, 0); ctx.lineTo(hx, 0); ctx.stroke();
      ctx.restore();
    } else {
      ctx.save();
      ctx.fillStyle = 'rgba(6,18,10,0.97)'; ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 3;
      ctx.beginPath(); ctx.ellipse(0, 0, this.rx, this.ry, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(20,50,28,0.6)'; ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.moveTo(-this.rx * 0.8, 0); ctx.lineTo(this.rx * 0.8, 0); ctx.stroke();
      ctx.restore();
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = 'rgba(70,185,140,0.60)'; ctx.lineWidth = 1.2;
      ctx.shadowColor = 'rgba(50,165,125,1)'; ctx.shadowBlur = 8;
      const hA = leadAngle - Math.PI * 0.4, hB = leadAngle + Math.PI * 0.4;
      ctx.beginPath();
      for (let i = 0; i <= 12; i++) {
        const a = hA + (hB - hA) * (i / 12);
        const px = Math.cos(a) * this.rx, py = Math.sin(a) * this.ry;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke(); ctx.restore();
    }
    ctx.restore();
  }
}

let debris = [];
function initDebris() {
  debris = Array.from({length: 8}, () => new Debris(false));
}

// ─── BRIDGE ───────────────────────────────────────────────────────────────────
function drawBridge(alpha) {
  if (bridgeImg.naturalWidth <= 0) return;
  const aspect = bridgeImg.naturalWidth / bridgeImg.naturalHeight;
  const bw = W;
  const bh = bw / aspect;
  ctx.save();
  ctx.globalAlpha = alpha * 0.82;
  // Center so HORIZON_Y bisects the image — reflection lines up with water surface
  ctx.drawImage(bridgeImg, 0, HORIZON_Y - bh * 0.5, bw, bh);
  ctx.restore();
}

// ─── DRAW SCENE ───────────────────────────────────────────────────────────────
function drawScene(now) {
  if (!sceneStart) return;
  const elapsed = now - sceneStart; // ms

  ctx.clearRect(0, 0, W, H);

  // 1. Sky gradient (fades in from black)
  const skyAlpha = Math.min(1, Math.max(0, (elapsed - T.HORIZON_FADE_START) / T.HORIZON_FADE_DUR));

  // Sky
  const grad = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
  grad.addColorStop(0.00, '#010109');
  grad.addColorStop(0.45, '#06040f');
  grad.addColorStop(0.82, '#100720');
  grad.addColorStop(1.00, '#1a0c1a');
  ctx.save(); ctx.globalAlpha = skyAlpha;
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, HORIZON_Y + 4);
  ctx.restore();

  // Moon
  const moonX = W * 0.73, moonY = HORIZON_Y * 0.22, moonR = 18;
  ctx.save(); ctx.globalAlpha = skyAlpha;
  const halo = ctx.createRadialGradient(moonX,moonY,moonR*0.5, moonX,moonY,moonR*5.5);
  halo.addColorStop(0,'rgba(220,235,255,0.14)'); halo.addColorStop(1,'rgba(180,210,255,0)');
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(moonX,moonY,moonR*5.5,0,Math.PI*2); ctx.fill();
  const disc=ctx.createRadialGradient(moonX-moonR*0.25,moonY-moonR*0.2,0, moonX,moonY,moonR);
  disc.addColorStop(0,'#f8faff'); disc.addColorStop(0.55,'#dde8f8'); disc.addColorStop(1,'#a8bcd8');
  ctx.fillStyle=disc; ctx.beginPath(); ctx.arc(moonX,moonY,moonR,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Stars — staggered blink-in
  ensureStars();
  const starsPhase = Math.min(1, Math.max(0, (elapsed - T.STARS_START) / T.STARS_DUR));
  const t = now * 0.001;
  for (const st of _stars) {
    if (starsPhase < st.bornT) continue;
    const localAge = (starsPhase - st.bornT) / Math.max(0.01, 1 - st.bornT);
    const bornAlpha = Math.min(1, localAge * 3);
    const tw = (0.35 + 0.65 * Math.abs(Math.sin(t * st.sp + st.ph))) * 0.88 * bornAlpha;
    ctx.save(); ctx.globalAlpha = tw;
    ctx.fillStyle = '#cce2ff'; ctx.shadowColor = '#98bcff'; ctx.shadowBlur = 3;
    ctx.beginPath(); ctx.arc(st.x * W, st.y * HORIZON_Y, st.s, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Treeline
  drawTrees(skyAlpha);

  // Cattails (left) and rushes (right) — fade in with water
  drawCattails(waterAlpha);
  drawRushes(waterAlpha);

  // Horizon line — thin bright seam
  ctx.save();
  ctx.globalAlpha = skyAlpha * 0.6;
  ctx.strokeStyle = 'rgba(100,160,220,0.4)';
  ctx.lineWidth   = 1;
  ctx.shadowColor = 'rgba(80,150,220,0.5)';
  ctx.shadowBlur  = 6;
  ctx.beginPath();
  ctx.moveTo(0, HORIZON_Y);
  for (let x = 0; x <= W; x += 14) {
    const wy = Math.sin(x * 0.018 + t * 1.1) * 1.1 + Math.sin(x * 0.031 + t * 0.7) * 0.5;
    ctx.lineTo(x, HORIZON_Y + wy);
  }
  ctx.stroke();
  ctx.restore();

  // Water (fades in a bit later)
  const waterAlpha = Math.min(1, Math.max(0, (elapsed - T.WATER_START) / T.WATER_DUR));
  const wGrad = ctx.createLinearGradient(0, HORIZON_Y, 0, H);
  wGrad.addColorStop(0,   'rgba(3,2,10,0.95)');
  wGrad.addColorStop(0.5, 'rgba(2,1,8,0.99)');
  wGrad.addColorStop(1,   'rgba(2,1,8,0.99)');
  ctx.save(); ctx.globalAlpha = waterAlpha;
  ctx.fillStyle = wGrad; ctx.fillRect(0, HORIZON_Y, W, H - HORIZON_Y);

  // Moon reflection column
  const reflLen = H - HORIZON_Y;
  const slices  = 30;
  for (let si = 0; si < slices; si++) {
    const vt  = si / slices;
    const vy  = HORIZON_Y + vt * reflLen;
    const colW = lerp(18, 80, vt) + Math.sin(t * 0.7) * 6;
    const n1   = perlin2(vt * 3.5 + t * 0.18, t * 0.09);
    const nm   = 0.4 + 0.6 * (n1 * 0.5 + 0.5);
    const baseA= 0.14 * Math.sin(vt * Math.PI) * (1 - vt * 0.4);
    const alpha= baseA * nm;
    if (alpha < 0.005) continue;
    const hShimmer = perlin2(vt * 2.2 + 10, t * 0.22) * colW * 0.35;
    const lx  = moonX - colW * 0.5 + hShimmer;
    ctx.globalAlpha = (alpha / 0.14) * waterAlpha;
    ctx.fillStyle   = 'rgba(200,225,255,0.18)';
    ctx.fillRect(lx, vy, colW, reflLen / slices + 1);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Bridge — drawn AFTER water so the built-in reflection sits on the surface
  drawBridge(skyAlpha);

  // Water shimmer line
  ctx.save(); ctx.globalAlpha = waterAlpha * 0.5;
  ctx.beginPath(); ctx.moveTo(0, HORIZON_Y + 2);
  for (let x = 0; x <= W; x += 12) {
    const wy = Math.sin(x * 0.019 + t * 1.1) * 1.3 + Math.sin(x * 0.03 + t * 0.75) * 0.6;
    ctx.lineTo(x, HORIZON_Y + 2 + wy);
  }
  ctx.strokeStyle = 'rgba(140,210,255,0.22)'; ctx.lineWidth = 1.2;
  ctx.shadowColor = 'rgba(100,190,255,0.4)'; ctx.shadowBlur = 5;
  ctx.stroke(); ctx.restore();

  // Shore
  const sg = ctx.createLinearGradient(0, H - 55, 0, H);
  sg.addColorStop(0, 'rgba(16,9,26,0)'); sg.addColorStop(0.2, '#18102a'); sg.addColorStop(1, '#0c0818');
  ctx.save(); ctx.globalAlpha = waterAlpha;
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.moveTo(0, H); ctx.lineTo(W, H); ctx.lineTo(W, H - 40);
  for (let x = W; x >= 0; x -= 30) {
    const wave = Math.sin((x/W)*Math.PI*4+t*0.5)*2.5 + Math.sin((x/W)*Math.PI*9+t*0.8)*1;
    ctx.lineTo(x, H - 40 + wave);
  }
  ctx.closePath(); ctx.fill(); ctx.restore();

  // Debris + lily pads — drawn over water, fade in with it
  const idxDt = 16; // approximate frame dt for update
  for (const d of debris) { d.update(); d.draw(waterAlpha); }
  for (const lp of lilyClump) { lp.update(idxDt); lp.draw(now, waterAlpha); }
  for (const lp of lilyPads)  { lp.update(idxDt); lp.draw(now, waterAlpha); }

  // ── LETTERS ──────────────────────────────────────────────────────────────────
  if (!letters) buildLetters();

  for (const ltr of letters) {
    const dropElapsed = elapsed - ltr.dropStart;
    if (dropElapsed < 0) continue; // not yet

    if (!ltr.settled) {
      // Quantized stutter fall
      ltr.progress = Math.min(1, ltr.progress + 0.015);
      const stepped = Math.floor(ltr.progress * 20) / 20;
      const startY  = -ltr.fs * 1.2;
      ltr.y = ltr.restY + (startY - ltr.restY) * (1 - stepped);
      ltr.x = ltr.restX;

      if (ltr.progress >= 1) {
        ltr.settled = true;
        ltr.y = ltr.restY;
        ltr.ringBorn = now;
        if (!ltr.ringSounded && ltr.ch !== ' ') {
          playTitleStoneSkip();
          ltr.ringSounded = true;
          ripples.push(new TitleRipple(ltr.restX, ltr.restY + 4));
        }
      }
    } else {
      // Gentle sine float after settling
      ltr.y = ltr.restY + Math.sin(t * 2 + ltr.restX * 0.008) * 0.6;
    }

    if (ltr.ch === ' ') continue;

    ctx.save();
    ctx.font      = `700 ${ltr.fs}px 'Silkscreen', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';

    // Glow + body
    ctx.shadowColor = 'rgba(160,220,255,0.85)';
    ctx.shadowBlur  = 18;
    ctx.fillStyle   = 'rgba(180,230,255,0.25)';
    ctx.fillText(ltr.ch, ltr.x, ltr.y);
    ctx.shadowBlur  = 7;
    ctx.fillStyle   = '#d0eeff';
    ctx.fillText(ltr.ch, ltr.x, ltr.y);

    // Reflection in water (flipped below horizon, faded)
    if (ltr.settled) {
      // With alphabetic baseline, ltr.y is the baseline — mirror from there
      const distBelow = ltr.y - HORIZON_Y;
      const mirrorY   = HORIZON_Y + distBelow + 4;
      ctx.save();
      ctx.translate(ltr.x, mirrorY);
      ctx.scale(1, -0.32);
      ctx.globalAlpha = 0.15;
      ctx.shadowBlur  = 0;
      ctx.fillStyle   = 'rgba(140,200,240,0.7)';
      ctx.fillText(ltr.ch, 0, 0);
      ctx.restore();
    }

    ctx.restore();
  }

  // Ripple rings from letter landings
  ripples = ripples.filter(r => !r.done);
  for (const r of ripples) r.draw(now);

  // ── CLICK PROMPT ─────────────────────────────────────────────────────────────
  const promptAlpha = Math.min(1, Math.max(0, (elapsed - T.CLICK_PROMPT) / 1200));
  if (promptAlpha > 0) {
    clickReady = true;
    const pulse = 0.30 + 0.30 * Math.abs(Math.sin(now * 0.0018));
    const promptY = HORIZON_Y + (H - HORIZON_Y) * 0.42; // closer to the title letters
    ctx.save();
    ctx.globalAlpha  = promptAlpha * pulse;
    const promptFs   = Math.max(18, Math.round(W * 0.016));
    ctx.font         = `${promptFs}px 'Silkscreen', monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'bottom';
    // Double-draw glow so it survives the dither pass
    ctx.shadowColor  = 'rgba(140,180,240,0.90)';
    ctx.shadowBlur   = 18;
    ctx.fillStyle    = 'rgba(140,180,220,0.45)';
    ctx.fillText('click to continue', W * 0.5, promptY);
    ctx.shadowBlur   = 6;
    ctx.fillStyle    = 'rgba(180,210,240,0.95)';
    ctx.fillText('click to continue', W * 0.5, promptY);
    ctx.restore();
  }
}

// ─── POST PROCESSING ──────────────────────────────────────────────────────────
const offscreen = document.createElement('canvas');
const octx      = offscreen.getContext('2d', { willReadFrequently: true });

const BAYER8 = [
   0,32, 8,40, 2,34,10,42,
  48,16,56,24,50,18,58,26,
  12,44, 4,36,14,46, 6,38,
  60,28,52,20,62,30,54,22,
   3,35,11,43, 1,33, 9,41,
  51,19,59,27,49,17,57,25,
  15,47, 7,39,13,45, 5,37,
  63,31,55,23,61,29,53,21,
].map(v => v / 64);

const PIX=3, CSTEPS=24, DSTR=0.018, ABER=0.006;
let postImageData = null;

function applyPost() {
  const pw=Math.ceil(W/PIX), ph=Math.ceil(H/PIX);
  if (offscreen.width!==pw||offscreen.height!==ph) {
    offscreen.width=pw; offscreen.height=ph; postImageData=null;
  }
  // Stamp overlay.png onto scene canvas so it gets dithered with everything else
  if (overlayImg.naturalWidth > 0) {
    ctx.save();
    ctx.globalAlpha = 1;
    ctx.drawImage(overlayImg, 0, 0, W, H);
    ctx.restore();
  }

  octx.clearRect(0,0,pw,ph);
  octx.drawImage(scene,0,0,pw,ph);
  const src=octx.getImageData(0,0,pw,ph), sd=src.data;
  if (!postImageData||postImageData.width!==pw||postImageData.height!==ph)
    postImageData=octx.createImageData(pw,ph);
  const dd=postImageData.data, cx=pw/2, cy=ph/2;
  for (let y=0;y<ph;y++) {
    for (let x=0;x<pw;x++) {
      const i=(y*pw+x)*4;
      // CRT barrel distortion (subtle — divisor 14)
      const nx=(x/pw)*2-1, ny=(y/ph)*2-1;
      const sxf=(nx+nx*(ny*ny)/14)*0.5+0.5;
      const syf=(ny+ny*(nx*nx)/14)*0.5+0.5;
      if(sxf<0||sxf>1||syf<0||syf>1){dd[i]=0;dd[i+1]=0;dd[i+2]=0;dd[i+3]=255;continue;}
      const sx=Math.round(sxf*pw), sy=Math.round(syf*ph);
      const si=(sy*pw+sx)*4;
      const dx=(sx-cx)/pw, dy=(sy-cy)/ph;
      const dist=Math.sqrt(dx*dx+dy*dy)*1.42;
      const offPx=Math.round(dist*ABER*pw);
      const ir=(sy*pw+Math.min(pw-1,sx+offPx))*4;
      const ib=(sy*pw+Math.max(0,sx-offPx))*4;
      let r=sd[ir],g=sd[si+1],b=sd[ib+2];
      const bv=BAYER8[(y%8)*8+(x%8)];
      const doff=(bv-0.5)*DSTR*255;
      r=Math.min(255,Math.max(0,Math.round((r+doff)/(255/CSTEPS))*(255/CSTEPS)));
      g=Math.min(255,Math.max(0,Math.round((g+doff)/(255/CSTEPS))*(255/CSTEPS)));
      b=Math.min(255,Math.max(0,Math.round((b+doff)/(255/CSTEPS))*(255/CSTEPS)));
      dd[i]=r;dd[i+1]=g;dd[i+2]=b;dd[i+3]=sd[si+3];
    }
  }
  octx.putImageData(postImageData,0,0);
  pctx.clearRect(0,0,W,H);
  pctx.save(); pctx.imageSmoothingEnabled=false;
  pctx.drawImage(offscreen,0,0,W,H); pctx.restore();
  pctx.save(); pctx.globalAlpha=0.10; pctx.fillStyle='#000';
  for (let y=0;y<H;y+=PIX) pctx.fillRect(0,y+PIX-1,W,1);
  pctx.restore();
  const vig=pctx.createRadialGradient(W*0.5,H*0.65,H*0.05,W*0.5,H*0.65,H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.60)');
  pctx.fillStyle=vig; pctx.fillRect(0,0,W,H);
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function frame(now) {
  if (!sceneStart) {
    // begin after fade
    ctx.clearRect(0,0,W,H);
    applyPost();
    requestAnimationFrame(frame);
    return;
  }
  ctx.clearRect(0,0,W,H);
  drawScene(now);
  applyPost();
  requestAnimationFrame(frame);
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
document.getElementById('clicker').addEventListener('click', () => {
  if (!audioStarted) {
    audioStarted = true;
    startTitleAudio();
  }
  if (clickReady && !sceneEnded) {
    sceneEnded = true;
    const fadeEl = document.getElementById('fade');
    fadeEl.style.transition = 'opacity 2.5s ease';
    fadeEl.style.opacity    = '1';
    setTimeout(() => { window.location.href = 'road.html'; }, 2600);
  }
});

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') {
    document.getElementById('clicker').click();
  }
});

// ─── START ────────────────────────────────────────────────────────────────────
requestAnimationFrame(frame);
initLilyPads();
initDebris();

const fadeEl = document.getElementById('fade');
fadeEl.style.transition = 'opacity 1.6s ease';
setTimeout(() => {
  fadeEl.style.opacity = '0';
  setTimeout(() => {
    fadeEl.style.pointerEvents = 'none';
    sceneStart = performance.now();
    requestAnimationFrame(frame);
  }, 1800);
}, 200);
</script>
</body>
